spring:
  profiles:
    active: test
  
  application:
    name: api-gateway-test
  
  # Exclude Spring Security auto-configuration to use custom JWT filter
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  
  cloud:
    gateway:
      routes:
        # Minimal routes for testing (without rate limiter to avoid Redis dependency)
        - id: test-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/test/**
          filters:
            - name: CircuitBreaker
              args:
                name: testCircuitBreaker
                fallbackUri: forward:/fallback/test
  
  # Redis configuration for tests
  # Note: If Redis is not available, the test will still run
  # but rate limiting features won't work
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT Configuration - provide default secret for tests
jwt:
  secret: ${JWT_SECRET:test-secret-key-for-testing-purposes-only-minimum-32-characters}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      testCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
    circuitbreakers:
      enabled: false

# Logging
logging:
  level:
    root: INFO
    com.ibm.aimonitoring: DEBUG
