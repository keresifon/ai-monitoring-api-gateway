replicaCount: 1

image:
  repository: ghcr.io/kere-sifon/ai-monitoring-api-gateway
  pullPolicy: IfNotPresent
  tag: "1.0.4"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  SPRING_PROFILES_ACTIVE: kubernetes

# Backend service URLs (K8s DNS names)
services:
  auth: http://auth-service:8084
  logProcessor: http://log-processor:8082
  logIngestion: http://log-ingestion:8081
  alert: http://alert-service:8083
  ml: http://ml-service:8000

# Redis for rate limiting
redis:
  host: redis-master
  port: 6379

# Secret name for JWT and Redis credentials (from install-dependencies.sh)
secrets:
  commonSecretName: ai-monitoring-secrets

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 24

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

openshift:
  enabled: false
  route:
    enabled: true
    host: ""
    annotations:
      haproxy.router.openshift.io/timeout: 60s
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
      destinationCACertificate: ""
