replicaCount: 1

image:
  repository: ghcr.io/keresifon/ai-monitoring-api-gateway
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi

env:
  SPRING_PROFILES_ACTIVE: kubernetes

# Backend service URLs (K8s DNS names)
services:
  auth: http://auth-service:8084
  logProcessor: http://log-processor:8082
  logIngestion: http://log-ingestion:8081
  alert: http://alert-service:8083
  ml: http://ml-service:8000

# Redis for rate limiting
redis:
  host: redis-master
  port: 6379

# Secret name for JWT and Redis credentials
secrets:
  commonSecretName: ai-monitoring-secrets
  # Override these at deploy time (e.g. --set secrets.jwtSecret=xxx)
  jwtSecret: ""
  corsAllowedOrigins: ""

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 24

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
