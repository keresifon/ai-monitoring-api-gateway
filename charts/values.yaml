replicaCount: 2

image:
  repository: ghcr.io/OWNER/ai-monitoring-api-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: api.ai-monitoring.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

env:
  SPRING_PROFILES_ACTIVE: kubernetes
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  AUTH_SERVICE_URL: http://auth-service:8084
  LOG_INGESTION_URL: http://log-ingestion:8081
  LOG_PROCESSOR_URL: http://log-processor:8082
  ALERT_SERVICE_URL: http://alert-service:8083
  ML_SERVICE_URL: http://ml-service:8000

secrets:
  jwtSecret: ""
  corsAllowedOrigins: "https://ai-monitoring.example.com"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
