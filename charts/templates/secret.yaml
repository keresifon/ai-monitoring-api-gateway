apiVersion: v1
kind: Secret
metadata:
  name: {{ include "api-gateway.fullname" . }}-secrets
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ (.Values.secrets.jwtSecret | default "") | b64enc | quote }}
  cors-allowed-origins: {{ (.Values.secrets.corsAllowedOrigins | default "") | b64enc | quote }}
